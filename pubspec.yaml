name: endroits_favoris
description: Application Flutter de gestion d'endroits favoris avec caméra, Riverpod et Google Maps.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Génération d'identifiants uniques (UUID v4) pour chaque endroit
  uuid: ^4.4.0

  # Gestion d'état globale avec Riverpod v2 (NotifierProvider)
  flutter_riverpod: ^2.5.1

  # Accès à la caméra et à la galerie photos
  image_picker: ^1.1.2

  # Affichage de cartes Google Maps dans Flutter
  google_maps_flutter: ^2.9.0

  # Obtention des coordonnées GPS de l'appareil
  geolocator: ^13.0.1

  # Conversion coordonnées GPS → adresse lisible (géocodage inverse)
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
